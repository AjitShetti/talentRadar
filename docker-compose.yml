services:
  # ─────────────────────────────────────────────────────────────────────────────
  # DATA LAYER
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: talentradar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talentRadar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-talentRadar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talentRadar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - talentradar-net

  redis:
    image: redis:7-alpine
    container_name: talentradar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - talentradar-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: talentradar-chromadb
    environment:
      CHROMA_SERVER_HTTP_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
      ANONYMIZED_TELEMETRY: "False"
      IS_PERSISTENT: "True"
    ports:
      - "8001:8000" # Mapped to 8001 per README table
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - talentradar-net

  # ─────────────────────────────────────────────────────────────────────────────
  # APPLICATION LAYER
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: talentradar-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./api:/app/api
      - ./storage:/app/storage
      - ./agents:/app/agents
      - ./config:/app/config
      - ./ingestion:/app/ingestion
      - ./ml:/app/ml
      - ./tests:/app/tests
      - ./data:/app/data          # shared raw JD output dir
    restart: unless-stopped
    networks:
      - talentradar-net

  # Airflow requires DB migration before scheduler/webserver start
  airflow-init:
    build:
      context: .
      dockerfile: infra/Dockerfile.airflow
    container_name: talentradar-airflow-init
    entrypoint: |
      /bin/bash -c "
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@talentradar.local \
          --password admin || true
      "
    env_file: .env
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-talentRadar}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-talentRadar}
      AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "False"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - talentradar-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: infra/Dockerfile.airflow
    container_name: talentradar-airflow-scheduler
    command: airflow scheduler
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-talentRadar}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-talentRadar}
      AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "False"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow/repo
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      RAW_DATA_DIR: /data/raw
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./ingestion/dags:/opt/airflow/dags
      - .:/opt/airflow/repo          # full project available via PYTHONPATH
      - ./data:/data                 # shared raw JD output dir
    restart: unless-stopped
    networks:
      - talentradar-net

  airflow-webserver:
    build:
      context: .
      dockerfile: infra/Dockerfile.airflow
    container_name: talentradar-airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-talentRadar}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-talentRadar}
      AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "False"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow/repo
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      RAW_DATA_DIR: /data/raw
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./ingestion/dags:/opt/airflow/dags
      - .:/opt/airflow/repo          # full project available via PYTHONPATH
      - ./data:/data                 # shared raw JD output dir
    restart: unless-stopped
    networks:
      - talentradar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentradar-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - talentradar-net

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  talentradar-net:
    driver: bridge