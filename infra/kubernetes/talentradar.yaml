apiVersion: v1
kind: Namespace
metadata:
  name: talentradar
  labels:
    name: talentradar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talentradar-api
  namespace: talentradar
  labels:
    app: talentradar
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: talentradar
      component: api
  template:
    metadata:
      labels:
        app: talentradar
        component: api
    spec:
      containers:
        - name: api
          image: talentradar-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: "talentradar-postgres"
            - name: POSTGRES_USER
              value: "talentradar"
            - name: POSTGRES_DB
              value: "talentradar"
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_URL
              value: "redis://talentradar-redis:6379/0"
            - name: CHROMA_HOST
              value: "talentradar-chromadb"
            - name: CHROMA_PORT
              value: "8000"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: talentradar-secrets
                  key: groq_api_key
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: talentradar-secrets
                  key: tavily_api_key
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: talentradar-secrets
                  key: jwt_secret_key
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: talentradar-api
  namespace: talentradar
spec:
  selector:
    app: talentradar
    component: api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talentradar-frontend
  namespace: talentradar
  labels:
    app: talentradar
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: talentradar
      component: frontend
  template:
    metadata:
      labels:
        app: talentradar
        component: frontend
    spec:
      containers:
        - name: frontend
          image: talentradar-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://talentradar-api:8000"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: talentradar-frontend
  namespace: talentradar
spec:
  selector:
    app: talentradar
    component: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talentradar-postgres
  namespace: talentradar
  labels:
    app: talentradar
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talentradar
      component: postgres
  template:
    metadata:
      labels:
        app: talentradar
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "talentradar"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: talentradar-secrets
                  key: postgres_password
            - name: POSTGRES_DB
              value: "talentradar"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "talentradar"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: talentradar-postgres
  namespace: talentradar
spec:
  selector:
    app: talentradar
    component: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: talentradar
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talentradar-redis
  namespace: talentradar
  labels:
    app: talentradar
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talentradar
      component: redis
  template:
    metadata:
      labels:
        app: talentradar
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: talentradar-redis
  namespace: talentradar
spec:
  selector:
    app: talentradar
    component: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talentradar-chromadb
  namespace: talentradar
  labels:
    app: talentradar
    component: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talentradar
      component: chromadb
  template:
    metadata:
      labels:
        app: talentradar
        component: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          env:
            - name: CHROMA_SERVER_HTTP_HOST
              value: "0.0.0.0"
            - name: CHROMA_SERVER_HTTP_PORT
              value: "8000"
            - name: ANONYMIZED_TELEMETRY
              value: "False"
            - name: IS_PERSISTENT
              value: "True"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: talentradar-chromadb
  namespace: talentradar
spec:
  selector:
    app: talentradar
    component: chromadb
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
