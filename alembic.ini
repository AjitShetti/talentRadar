# alembic.ini
# ---------------------------------------------------------------------------
# Alembic configuration for TalentRadar.
# The sqlalchemy.url value below is a placeholder; it is overridden at
# runtime by storage/migrations/env.py using pydantic-settings.
# ---------------------------------------------------------------------------

[alembic]
# Path to migration scripts — relative to this ini file (project root)
script_location = storage/migrations

# Revision file naming: timestamp_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Timezone for timestamps in generated filenames
timezone = UTC

# Truncate slug to keep filenames sane
truncate_slug_length = 40

# Placeholder — overridden in env.py via settings.database_url_sync
sqlalchemy.url = postgresql+psycopg2://user:password@localhost/talentRadar

[post_write_hooks]
# No hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
